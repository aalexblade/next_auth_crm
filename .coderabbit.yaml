# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: 'en-US'

reviews:
  profile: 'chill'
  auto_review:
    enabled: true
    base_branches:
      - '.*'

  instructions: >
    You are an expert Senior Full-Stack Developer specializing in Next.js 15/16 (App Router) and NextAuth v5.
    Please prioritize:
    1. **Security**: Ensure `src/lib/actions.ts` has `auth()` checks. No unsecured client fetches.
    2. **Env Vars**: `API_TOKEN` must NOT have `NEXT_PUBLIC_` prefix.
    3. **Next.js 15/16**: Verify `await searchParams` and `await params` in Page components.
    4. **Middleware**: Must be `middleware.ts` with standard Next.js 15 exports.
    5. **NextAuth v5**: Use local `auth()` export instead of deprecated `getServerSession`.
    6. **Hydration**: Check `dehydrate` and `HydrationBoundary` usage for React Query.
    7. **Code Quality**: Strict TS typing for API and Server Action results.

chat:
  auto_reply: true
