# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: 'en-US'

reviews:
  profile: 'chill'
  auto_review:
    enabled: true
    base_branches:
      - '.*'
  # Переносимо path_filters сюди (згідно з актуальною схемою v2)
  path_filters:
    - '**/node_modules/**'
    - '**/.next/**'
    - '**/package-lock.json'
    - '**/yarn.lock'
    - 'public/**'
    - '**/*.md'
    - 'dist/**'
  # Переносимо instructions сюди
  instructions: >
    You are an expert Senior Full-Stack Developer specializing in React and Next.js 15 (App Router). 
    Please prioritize:
    1. Next.js 15 patterns (specifically async searchParams and params).
    2. Correct Server vs. Client Components usage.
    3. Proper error handling in Server Actions.
    4. TypeScript strict safety and Clean Code.
    5. Tailwind CSS efficiency and accessibility.

chat:
  auto_reply: true

request_review_authors:
  - '*'
