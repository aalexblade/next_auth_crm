# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: 'en-US'

reviews:
  profile: 'chill'
  auto_review:
    enabled: true
    base_branches:
      - '.*'
  # Видаляємо path_filters повністю, щоб зняти всі блокировки
  instructions: >
    You are an expert Senior Full-Stack Developer specializing in React and Next.js 15 (App Router). 
    Please perform a deep review of the following:
    1. Next.js 15 patterns (async searchParams and params).
    2. Session validation in Server Actions (auth() checks in src/lib/actions.ts).
    3. Proper environment variable usage (no NEXT_PUBLIC_ for sensitive tokens in .env.example).
    4. Correct Server vs. Client Components usage.
    5. TypeScript strict safety and Clean Code.

chat:
  auto_reply: true
