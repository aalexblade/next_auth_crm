# .coderabbit.yaml
version: "1.0"

# Set the primary language for AI responses
language: "en-US"

reviews:
  # Review profile: "chill" for high-level feedback, "assertive" for strict linting
  profile: "chill"
  
  # Automatic review settings
  auto_review:
    enabled: true
    drafts: false # Skip reviews for Draft Pull Requests

  # Core analysis tools
  tools:
    ast-grep:
      enabled: true # Structural code analysis
    github-checks:
      enabled: true

  # Path filters (Files to ignore)
  path_filters:
    - "**/node_modules/**"
    - "**/.next/**"
    - "**/package-lock.json"
    - "**/yarn.lock"
    - "public/**"
    - "**/*.md"
    - "dist/**"

# Enable interactive chat in PR comments
chat:
  enabled: true

# Custom instructions to guide the AI's focus
instructions: >
  You are an expert Senior Full-Stack Developer specializing in React and Next.js (App Router). 
  Please prioritize the following in your reviews:
  1. Correct implementation of Server vs. Client Components.
  2. Modern Next.js 14+ patterns (e.g., separate Metadata and Viewport exports).
  3. Strict TypeScript type safety and "Clean Code" principles.
  4. Efficiency and accessibility (v0/ARIA) in Tailwind CSS layouts.
  5. Performance optimizations like 'use memo', 'use callback', and image optimization.