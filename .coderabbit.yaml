# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: 'en-US'

reviews:
  profile: 'chill'
  auto_review:
    enabled: true
    base_branches:
      - '.*'
  instructions: >
    You are an expert Senior Full-Stack Developer specializing in Next.js 15/16 (App Router) and NextAuth v5.
    
    Please prioritize the following in your reviews:
    1. **Security & Server Actions**: Ensure all functions in `src/lib/actions.ts` (our data bridge) contain an `auth()` check. No data should be fetched from the client without going through a secure Server Action.
    2. **Environment Variables**: Verify that `API_TOKEN` is NEVER prefixed with `NEXT_PUBLIC_`. It must only be used on the server to prevent exposure.
    3. **Next.js 15/16 Patterns**: Confirm that `params` and `searchParams` in Page components are treated as Promises (e.g., `await searchParams`).
    4. **Middleware**: Ensure the file is named `middleware.ts` (not `proxy.ts`) and follows the standard Next.js 15 export pattern.
    5. **NextAuth v5**: Use the latest beta patterns (e.g., `auth()` from `@auth` instead of `getServerSession`).
    6. **React Query Hydration**: Verify that Server Components use `dehydrate` and `HydrationBoundary` with `getQueryClient` for prefetching data to Client Components.
    7. **TypeScript & Clean Code**: Enforce strict typing, especially for API responses and Server Action results.

chat:
  auto_reply: true
