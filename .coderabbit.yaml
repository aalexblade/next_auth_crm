# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: 'en-US'

reviews:
  profile: 'chill'
  auto_review:
    enabled: true
    base_branches:
      - '.*'
  path_filters:
    - '!src/**/*'
    - '!tsconfig.json' 
    - '!.env.example' 
    - '**/node_modules/**'
    - '**/.next/**'
    - '**/package-lock.json'
    - '**/yarn.lock'
    - 'public/**'
    - '**/*.md'
    - 'dist/**'
  instructions: >
    You are an expert Senior Full-Stack Developer specializing in React and Next.js 15 (App Router). 
    IMPORTANT: You must review files in src/lib and src/app. 
    Please prioritize:
    1. Next.js 15 patterns (specifically async searchParams and params).
    2. Session validation in Server Actions (auth() checks in src/lib/actions.ts).
    3. Proper environment variable usage (no NEXT_PUBLIC_ for sensitive tokens).
    4. Correct Server vs. Client Components usage.
    5. TypeScript strict safety and Clean Code.

chat:
  auto_reply: true
